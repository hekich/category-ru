name: Update sing-box rule-set

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

concurrency:
  group: update-category-ru-rule-set-${{ github.ref }}
  cancel-in-progress: true

env:
  RULE_SET_JSON: rules/category-ru.json
  RULE_SET_BINARY: rules/category-ru.srs
  BUN_VERSION: 1.3.10
  SING_BOX_VERSION: 1.13.2
  SING_BOX_ARCHIVE: sing-box-1.13.2-linux-amd64.tar.gz
  SING_BOX_TARBALL_SHA256: 679fd29c38c6cdd33908a7e52cb277ecfb8e214b6384a93cc8f8d5b55bc1c894

jobs:
  update-rule-set:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run project checks
        run: bun run check

      - name: Install sing-box CLI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "${SING_BOX_ARCHIVE}" "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/${SING_BOX_ARCHIVE}"
          echo "${SING_BOX_TARBALL_SHA256}  ${SING_BOX_ARCHIVE}" | sha256sum --check --status
          tar -xzf "${SING_BOX_ARCHIVE}"
          install "sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box" "$HOME/.local/bin/sing-box"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/sing-box" version

      - name: Generate sing-box rule-set JSON
        run: bun run ./src/index.ts --output "${{ env.RULE_SET_JSON }}"

      - name: Validate generated JSON
        shell: bash
        run: |
          set -euo pipefail
          test -s "${RULE_SET_JSON}"
          node -e "JSON.parse(require('node:fs').readFileSync(process.argv[1], 'utf8'))" "${RULE_SET_JSON}"

      - name: Compile rule-set to binary .srs
        run: sing-box rule-set compile --output "${{ env.RULE_SET_BINARY }}" "${{ env.RULE_SET_JSON }}"

      - name: Validate generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -s "${RULE_SET_JSON}"
          test -s "${RULE_SET_BINARY}"

      - name: Commit updated rule-set files
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"

          if [ "$(git rev-parse "origin/${GITHUB_REF_NAME}")" != "${GITHUB_SHA}" ]; then
            echo "Branch advanced after this workflow started; refusing to commit stale generated files."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${RULE_SET_JSON}" "${RULE_SET_BINARY}"

          if git diff --cached --quiet; then
            echo "No rule-set changes to commit."
            exit 0
          fi

          git commit -m "chore: update sing-box rule-set"
          git push origin "HEAD:${GITHUB_REF_NAME}"