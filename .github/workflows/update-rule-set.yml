name: Update rule-set artifacts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

concurrency:
  group: update-category-ru-rule-set-${{ github.ref }}
  cancel-in-progress: true

env:
  RULE_SET_JSON: rules/sing-box/category-ru.json
  RULE_SET_BINARY: rules/sing-box/category-ru.srs
  MIHOMO_RULE_SET_TEXT: rules/mihomo/category-ru.lst
  MIHOMO_RULE_SET_BINARY: rules/mihomo/category-ru.mrs
  BUN_VERSION: 1.3.13
  SING_BOX_VERSION: 1.13.2
  SING_BOX_ARCHIVE: sing-box-1.13.2-linux-amd64.tar.gz
  SING_BOX_TARBALL_SHA256: 679fd29c38c6cdd33908a7e52cb277ecfb8e214b6384a93cc8f8d5b55bc1c894
  MIHOMO_VERSION: 1.19.24
  MIHOMO_ARCHIVE: mihomo-linux-amd64-compatible-v1.19.24.gz
  MIHOMO_ARCHIVE_SHA256: 7c8678fc20a1d3af9bfb87ccee428112b74398f7e04b6ddb044f1e7b94539870

jobs:
  update-rule-set:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run project checks
        run: bun run check

      - name: Install sing-box CLI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "${SING_BOX_ARCHIVE}" "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/${SING_BOX_ARCHIVE}"
          echo "${SING_BOX_TARBALL_SHA256}  ${SING_BOX_ARCHIVE}" | sha256sum --check --status
          tar -xzf "${SING_BOX_ARCHIVE}"
          install "sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box" "$HOME/.local/bin/sing-box"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/sing-box" version

      - name: Generate rule-set text artifacts
        run: bun run ./src/index.ts --output "${{ env.RULE_SET_JSON }}" --mihomo-output "${{ env.MIHOMO_RULE_SET_TEXT }}"

      - name: Canonicalize generated rule-set JSON
        run: bun run rule-set:format && bun run rule-set:check

      - name: Validate generated sing-box JSON
        shell: bash
        run: |
          set -euo pipefail
          test -s "${RULE_SET_JSON}"
          node -e "JSON.parse(require('node:fs').readFileSync(process.argv[1], 'utf8'))" "${RULE_SET_JSON}"

      - name: Compile rule-set to binary .srs
        run: sing-box rule-set compile --output "${{ env.RULE_SET_BINARY }}" "${{ env.RULE_SET_JSON }}"

      - name: Install Mihomo CLI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL --connect-timeout 10 --max-time 120 --retry 3 --retry-all-errors -o "${MIHOMO_ARCHIVE}" "https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/${MIHOMO_ARCHIVE}"
          echo "${MIHOMO_ARCHIVE_SHA256}  ${MIHOMO_ARCHIVE}" | sha256sum --check --status
          gzip -dk "${MIHOMO_ARCHIVE}"
          install "${MIHOMO_ARCHIVE%.gz}" "$HOME/.local/bin/mihomo"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mihomo" -v

      - name: Compile Mihomo rule-set to binary .mrs
        shell: bash
        run: |
          set -euo pipefail
          test -s "${MIHOMO_RULE_SET_TEXT}"
          mihomo convert-ruleset domain text "${MIHOMO_RULE_SET_TEXT}" "${MIHOMO_RULE_SET_BINARY}"
          test -s "${MIHOMO_RULE_SET_BINARY}"

      - name: Validate generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -s "${RULE_SET_JSON}"
          test -s "${RULE_SET_BINARY}"
          test -s "${MIHOMO_RULE_SET_TEXT}"
          test -s "${MIHOMO_RULE_SET_BINARY}"

      - name: Commit updated rule-set files
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          AUTHENTICATED_ORIGIN="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch "${AUTHENTICATED_ORIGIN}" "${GITHUB_REF_NAME}"

          if [ "$(git rev-parse FETCH_HEAD)" != "${GITHUB_SHA}" ]; then
            echo "Branch advanced after this workflow started; refusing to commit stale generated files."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${RULE_SET_JSON}" "${RULE_SET_BINARY}" "${MIHOMO_RULE_SET_TEXT}" "${MIHOMO_RULE_SET_BINARY}"

          if git diff --cached --quiet; then
            echo "No rule-set changes to commit."
            exit 0
          fi

          git commit -m "chore: update rule-set artifacts"
          git push "${AUTHENTICATED_ORIGIN}" "HEAD:${GITHUB_REF_NAME}"
